baseURL = "https://ryojifujishita.github.io/Ryoji-Fujishita-works/"
title = "Ryoji Fujishita Works"
theme = "portfolio"
publishDir = "docs"
defaultContentLanguage = "ja"

[languages]
  [languages.ja]
    languageName = "Japanese"
    weight = 1
    title = "Ryoji Fujishita Works"

[pagination]
pagerSize = 5

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
disableXML = true
minifyOutput = true

[params]
    # Style options: default (pink), blue, green, pink, red, sea, violet
    style = "sea"

    description = "Ryoji Fujishita's Portfolio"
    copyright = "© 2024 Ryoji Fujishita"
    sidebarAbout = [
        "I am a creative developer focused on creating innovative solutions.",
        "Based in Japan"
    ]
    # Contact page
    email = "your.email@example.com"
    address = "Tokyo, Japan"

    # Nav links in the side bar
    [[params.navlinks]]
    name = "Home"
    url = "portfolio/"
    home = true

    [[params.navlinks]]
    name = "About"
    url = "about/"

    [[params.navlinks]]
    name = "Blog"
    url = "blog/"

    [params.social]
    github = "https://github.com/Ryojifujishita"
    linkedin = "https://linkedin.com/in/yourprofile"
    twitter = "https://twitter.com/yourprofile"

[params.homeInfoParams]
Title = "Welcome to My Portfolio 👋"
Content = """
Welcome to my personal website. I'm a developer passionate about creating and sharing.
Here you'll find my projects, blog posts, and more.
"""

[params.profileMode]
enabled = true
title = "Ryoji Fujishita"
subtitle = "Developer & Creator"
imageUrl = "/images/profile.jpg"
imageTitle = "Profile Image"

[[menu.main]]
identifier = "home"
name = "🏠 Home"
url = "/"
weight = 10

[[menu.main]]
identifier = "blog"
name = "📝 Blog"
url = "/blog"
weight = 20

[[menu.main]]
identifier = "search"
name = "🔍 Search"
url = "/search"
weight = 30

[[menu.main]]
identifier = "archives"
name = "📚 Archives"
url = "/archives"
weight = 40 