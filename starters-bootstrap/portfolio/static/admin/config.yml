backend:
  name: github
  repo: ryojifujishita/ryoji-fujishita-works  # あなたのGitHubリポジトリ名に置き換えてください
  branch: main  # またはkickoffなど、使いたいブランチ名

media_folder: "static/uploads"
public_folder: "/uploads"

collections:
  - name: "works"
    label: "制作実績"
    folder: "content/works"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "タイトル", name: "title", widget: "string" }
      - { label: "本文", name: "body", widget: "markdown" }
      - { label: "日付", name: "date", widget: "datetime" }