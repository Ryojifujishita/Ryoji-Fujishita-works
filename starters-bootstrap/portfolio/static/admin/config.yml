backend:
  name: git-gateway
  branch: main
  identity_url: https://ryoji-fujishita-works.netlify.app/.netlify/identity
  site_domain: ryoji-fujishita-works.netlify.app
  gateway_url: https://api.netlify.com

media_folder: "static/uploads"
public_folder: "/uploads"

collections:
  - name: "works"
    label: "制作実績"
    folder: "content/works"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "タイトル", name: "title", widget: "string" }
      - { label: "本文", name: "body", widget: "markdown" }
      - { label: "日付", name: "date", widget: "datetime" }