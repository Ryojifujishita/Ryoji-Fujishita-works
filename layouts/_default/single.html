{{ define "main" }}
<article>
    <h1>{{ .Title }}</h1>
    <time>{{ .Date.Format "2006-01-02" }}</time>
    {{ with .Params.tags }}
    <div class="tags">
        {{ range . }}
        <span class="tag">{{ . }}</span>
        {{ end }}
    </div>
    {{ end }}
    <div class="content">
        {{ .Content }}
    </div>
</article>
{{ end }}
